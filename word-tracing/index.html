<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Tracing Practice - Teachers Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Quicksand:wght@400;600;700&family=Andika:wght@400;700&family=Dancing+Script&family=Cedarville+Cursive&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/kg-primary-dots" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/print-clearly" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/teaching-print" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="controls no-print">
    <div class="header-row">
      <h1>Word Tracing Practice</h1>
      <button type="button" id="help-btn" class="help-btn" title="Print help">?</button>
    </div>
    <p class="subtitle">For kindergarten (ages 3–4). Enter words below, one per line or comma-separated. Each word gets its own printable page.</p>
    <label class="trace-style-label">Font:</label>
    <select id="font-choice">
      <option value="Print Dashed">Print Dashed (dashed outline)</option>
      <option value="KG Primary Dots">KG Primary Dots (dotted)</option>
      <option value="KG Primary Dots Lined">KG Primary Dots Lined (dotted + lines)</option>
      <option value="Teaching Print">Teaching Print (dotted)</option>
      <option value="Print Clearly">Print Clearly (solid outline)</option>
      <option value="Andika">Andika (clear, for literacy)</option>
      <option value="Nunito">Nunito (rounded)</option>
      <option value="Quicksand">Quicksand (rounded)</option>
      <option value="Dancing Script">Dancing Script (cursive)</option>
      <option value="Cedarville Cursive">Cedarville Cursive (handwriting)</option>
    </select>
    <div class="config-block">
      <label class="config-option">
        <input type="checkbox" id="show-days" checked>
        Show days in table
      </label>
      <label class="config-option">
        <input type="checkbox" id="show-week-of" checked>
        Show "Week of" footer
      </label>
      <label class="config-option">
        <input type="checkbox" id="soft-grey">
        Soft grey for tracing (readable but traceable)
      </label>
    </div>
    <textarea id="word-input" rows="5" placeholder="cat&#10;dog&#10;mom"></textarea>
    <div class="buttons">
      <button id="print-btn">Print</button>
    </div>
  </div>

  <div id="help-modal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h2>Print settings</h2>
      <ul>
        <li><strong>Orientation:</strong> Landscape</li>
        <li><strong>Headers and footers:</strong> Turn off to hide the page address, URL, and date in the margin</li>
      </ul>
      <button type="button" class="modal-close">Close</button>
    </div>
  </div>

  <div id="output"></div>

  <script>
    const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
    const STORAGE_KEY = 'word-tracing-state';

    function parseWords(input) {
      return input
        .split(/[\n,]+/)
        .map(w => w.trim())
        .filter(w => w.length > 0);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function generatePage(word) {
      const fontFamily = document.getElementById('font-choice').value;
      const showDays = document.getElementById('show-days').checked;
      const showWeekOf = document.getElementById('show-week-of').checked;
      const softGrey = document.getElementById('soft-grey').checked;
      const fallback = (fontFamily === 'Dancing Script' || fontFamily === 'Cedarville Cursive') ? 'cursive' : 'sans-serif';
      const color = softGrey ? 'color:#b5b5b5;' : '';
      const traceable = `<span class="trace-word" style="font-family:'${escapeHtml(fontFamily)}', ${fallback}; ${color}">${escapeHtml(word)}</span>`;
      const rows = DAYS.map(day => {
        const dayCell = showDays ? `<td class="day-cell">${escapeHtml(day)}</td>` : '';
        return `<tr>${dayCell}<td class="trace-cell">${traceable}</td></tr>`;
      }).join('');

      const weekOfHtml = showWeekOf ? '<p class="week-of">Week of _______________</p>' : '';
      return `
        <div class="practice-page">
          <h2 class="word-header">${escapeHtml(word)}</h2>
          <table class="practice-table">
            <tbody>
              ${rows}
            </tbody>
          </table>
          ${weekOfHtml}
        </div>
      `;
    }

    function update() {
      const input = document.getElementById('word-input').value;
      const words = parseWords(input);
      const output = document.getElementById('output');

      if (words.length === 0) {
        output.innerHTML = '<p class="no-words">Enter at least one word.</p>';
        return;
      }

      output.innerHTML = words.map(generatePage).join('');
      saveState();
    }

    function saveState() {
      try {
        const state = {
          words: document.getElementById('word-input').value,
          font: document.getElementById('font-choice').value,
          showDays: document.getElementById('show-days').checked,
          showWeekOf: document.getElementById('show-week-of').checked,
          softGrey: document.getElementById('soft-grey').checked
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (e) {}
    }

    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const state = JSON.parse(saved);
          document.getElementById('word-input').value = state.words || '';
          if (state.font) {
            document.getElementById('font-choice').value = state.font;
          }
          if (typeof state.showDays === 'boolean') {
            document.getElementById('show-days').checked = state.showDays;
          }
          if (typeof state.showWeekOf === 'boolean') {
            document.getElementById('show-week-of').checked = state.showWeekOf;
          }
          if (typeof state.softGrey === 'boolean') {
            document.getElementById('soft-grey').checked = state.softGrey;
          }
        }
      } catch (e) {}
    }

    loadState();

    document.getElementById('word-input').addEventListener('input', update);
    document.getElementById('word-input').addEventListener('change', update);
    document.getElementById('font-choice').addEventListener('change', update);
    document.getElementById('show-days').addEventListener('change', update);
    document.getElementById('show-week-of').addEventListener('change', update);
    document.getElementById('soft-grey').addEventListener('change', update);

    update();

    document.getElementById('print-btn').addEventListener('click', () => {
      window.print();
    });

    const helpModal = document.getElementById('help-modal');
    document.getElementById('help-btn').addEventListener('click', () => {
      helpModal.hidden = false;
    });
    helpModal.querySelector('.modal-backdrop').addEventListener('click', () => {
      helpModal.hidden = true;
    });
    helpModal.querySelector('.modal-close').addEventListener('click', () => {
      helpModal.hidden = true;
    });
  </script>
</body>
</html>
